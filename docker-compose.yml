# ─────────────────────────────────────────────────────────────────────────────
# autoliga_uz — docker-compose
#
# Services:
#   db      — PostgreSQL 15
#   web     — Django (gunicorn)
#   bot     — Telegram bot (aiogram polling, standalone)
#
# Usage:
#   Build + start:  docker compose up --build
#   Run tests:      docker compose run --rm web python manage.py test
#   Migrations:     docker compose run --rm web python manage.py migrate
#   Logs:           docker compose logs -f bot
# ─────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: myproject.settings

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-autoliga_uz}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-autoliga_uz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django web (gunicorn) ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    <<: *app-env
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: db
      ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0,web"
    volumes:
      - media_data:/app/media
      - static_data:/app/static
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate --noinput && gunicorn myproject.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"

  # ── Telegram bot (polling — NO webhook) ────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    <<: *app-env
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: db
    volumes:
      - media_data:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    # Bot has no HTTP server — check that the Python process is alive
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: python Autoliga_Botfile/bot.py

  # ── Nginx reverse proxy (uncomment for production) ──────────────────────────
  # nginx:
  #   image: nginx:1.25-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - static_data:/app/static:ro
  #     - media_data:/app/media:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - web

volumes:
  postgres_data:
  media_data:
  static_data:
