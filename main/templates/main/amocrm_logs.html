{% extends "admin/base_site.html" %}

{% block extrastyle %}
<style>
    .logs-container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 20px;
    }

    .logs-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 30px;
        color: #333;
    }

    .log-section {
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        margin-bottom: 30px;
        overflow: hidden;
    }

    .log-section__header {
        background: linear-gradient(135deg, #dc3545, #c82333);
        color: white;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: 600;
    }

    .log-section__content {
        padding: 20px;
        max-height: 500px;
        overflow-y: auto;
        background: #f8f9fa;
    }

    .log-line {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        padding: 8px 12px;
        margin-bottom: 4px;
        background: #fff;
        border-left: 3px solid #dc3545;
        border-radius: 4px;
        word-wrap: break-word;
        white-space: pre-wrap;
    }

    .log-line:hover {
        background: #fff3cd;
    }

    .log-empty {
        text-align: center;
        padding: 40px;
        color: #6c757d;
        font-size: 16px;
    }

    .log-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }

    .log-btn {
        padding: 10px 20px;
        border-radius: 6px;
        text-decoration: none !important;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .log-btn--back {
        background: linear-gradient(135deg, #1a4dd3, #000f35);
        color: white !important;
    }

    .log-btn--refresh {
        background: linear-gradient(135deg, #28a745, #218838);
        color: white !important;
    }

    .log-stats {
        background: linear-gradient(135deg, #031b58 0%, #1a4dd3 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .log-stats__item {
        background: rgba(255, 255, 255, 0.2);
        padding: 15px;
        border-radius: 6px;
    }

    @media (max-width: 768px) {
        .logs-container {
            padding: 15px;
        }

        .log-stats {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="logs-container">
    <h1 class="logs-title">Логи ошибок amoCRM</h1>

    <!-- sening HTML o‘zgarmaydi -->
</div>
{% endblock %}
